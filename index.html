<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plinko Name Picker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <header>
      <h1>Plinko Name Picker</h1>
    </header>

    <main>
      <div id="board-container">
        <canvas id="plinko-canvas"></canvas>
      </div>

      <section id="controls">
        <label for="name-input">
          Names <span id="name-count"></span>
        </label>
        <textarea
          id="name-input"
          placeholder="Enter names, one per line..."
          rows="6"
          spellcheck="false"
        ></textarea>
        <div id="controls-footer">
          <button id="settings-btn" aria-label="Settings">⚙</button>
          <button id="drop-btn" disabled>Drop!</button>

          <div id="settings-panel" class="hidden" role="dialog" aria-label="Settings">
            <label class="settings-row">
              <input type="checkbox" id="physics-toggle" />
              <span class="settings-label">Physics mode</span>
            </label>
            <p class="settings-desc">Ball follows real physics instead of a preset path.</p>
            <div class="settings-divider"></div>
            <label class="settings-row">
              <input type="checkbox" id="aiming-toggle" />
              <span class="settings-label">Aiming mode</span>
            </label>
            <p class="settings-desc">Ball sways before dropping — click Drop to release from wherever it is.</p>
            <div class="settings-divider"></div>
            <div class="settings-row">
              <span class="settings-label">Ball size</span>
              <input type="range" id="ball-size-slider" min="8" max="50" value="30" />
              <span id="ball-size-value">30</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Winner Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <p id="modal-winner-text"></p>
      <div id="modal-buttons">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-ok" autofocus>OK</button>
      </div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-overlay" class="hidden">
    <div id="gameover">
      <h2>All done!</h2>
      <p id="gameover-text"></p>
      <button id="gameover-restart">Start Over</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
